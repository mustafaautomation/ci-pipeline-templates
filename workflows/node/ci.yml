# Node.js CI Pipeline
# Usage: Copy to .github/workflows/ci.yml
# Supports: npm/yarn/pnpm, Node 20+, lint, test, build
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check
        continue-on-error: true

      - name: Type check
        run: npm run typecheck
        if: hashFiles('tsconfig.json') != ''

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            reports/
          retention-days: 14
          if-no-files-found: ignore
