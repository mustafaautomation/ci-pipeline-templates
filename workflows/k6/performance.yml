# k6 Performance Testing Pipeline
# Usage: Copy to .github/workflows/performance.yml
# Supports: smoke, load, stress tests with HTML reports
name: Performance Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, load, stress, spike]

permissions:
  contents: read

jobs:
  performance:
    name: k6 Performance
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz -L | tar xvz --strip-components 1
          sudo mv k6 /usr/local/bin/

      - name: Run performance test
        run: k6 run tests/${{ inputs.test_type || 'smoke' }}.test.js
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://dummyjson.com' }}
        continue-on-error: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-${{ github.run_id }}
          path: reports/
          retention-days: 14
          if-no-files-found: ignore
